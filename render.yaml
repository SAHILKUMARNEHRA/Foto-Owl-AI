services:
  - type: web
    name: foto-owl-pipeline-api
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MODEL_PROVIDER
        value: gemini
      - key: TEXT_MODEL
        value: gemini-2.0-flash-lite
      - key: VISION_MODEL
        value: gemini-2.0-flash
      - key: DEFAULT_FPS
        value: "24"
      - key: RENDER_CRF
        value: "28"
      - key: GEMINI_API_KEY
        sync: false
